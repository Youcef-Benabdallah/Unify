<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unify — Documentation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e0e; color: #f3f4f6;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    .logo { font-size: 3rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 1rem; }
    .logo span:nth-child(1) { color: #c8b4e6; }
    .logo span:nth-child(2) { color: #f9e79f; }
    .logo span:nth-child(3) { color: #a9dfbf; }
    .logo span:nth-child(4) { color: #ffb6c1; }
    .logo span:nth-child(5) { color: #aec6ff; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; color: #c8b4e6; }
    p { color: #a3a3a3; margin-bottom: 2rem; max-width: 500px; line-height: 1.6; }
    .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .links a {
      background: #1a1a1a; color: #c8b4e6;
      border: 2px solid #c8b4e6; border-radius: 8px;
      padding: 12px 24px; font-weight: 700; text-decoration: none;
      transition: .15s ease;
    }
    .links a:hover { background: #c8b4e6; color: #0e0e0e; }
    .footer { margin-top: 3rem; font-size: .85rem; color: #6b7280; }
    .footer a { color: #aec6ff; }
  </style>
</head>
<body>
  <div class="logo">
    <span>U</span><span>n</span><span>i</span><span>f</span><span>y</span>
  </div>
  <h1>Neu-Brutalism .uix Framework</h1>
  <p>Built by <strong>Youcef Benabdallah</strong> — a static site framework with neu-brutalism design and HMR dev server.</p>
  <div class="links">
    <a href="https://unify-docs.netlify.app/">Documentation</a>
    <a href="https://github.com/Youcef-Benabdallah/Unify">GitHub</a>
    <a href="https://youcefdev.netlify.app/">Portfolio</a>
  </div>
  <div class="footer">
    <a href="https://youcefdev.netlify.app/">Youcef Benabdallah</a> · v0.6.7
  </div>
</body>
</html>
